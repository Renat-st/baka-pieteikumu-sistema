<!DOCTYPE html>
<html>
<head>
    <title>Reģistrācija</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Jauna lietotāja reģistrācija</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Lietotājvārds</label>
                            <input type="text" name="username" class="form-control" required>
                            <div class="form-text">
                                Nepieciešams, 150 vai mazāk rakstzīmju. Tikai burti, cipari un @/./+/-/_.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Parole</label>
                            <input type="password" name="password1" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Paroles apstiprinājums</label>
                            <input type="password" name="password2" class="form-control" required>
                            <div class="form-text">
                                Ievadi iepriekš norādīto paroli verifikācijai.
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Reģistrēties
                        </button>
                    </form>

                    <div class="mt-3 text-center">
                        <a href="/accounts/login/">Jau ir konts? Pieslēgties</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
