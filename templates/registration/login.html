<!DOCTYPE html>
<html>
<head>
    <title>Pieslēgties</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h3 class="mb-0">Pieslēgties sistēmai</h3>
                </div>
                <div class="card-body">
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Nepareizs lietotājvārds vai parole.
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label">Lietotājvārds</label>
                            <input type="text" name="username" autofocus required id="id_username" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label for="id_password" class="form-label">Parole</label>
                            <input type="password" name="password" required id="id_password" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Pieslēgties</button>
						<div class="mt-3 text-center">
    <a href="/register/">Nav konta? Reģistrēties</a>
</div>

                        {% if next %}
                            <input type="hidden" name="next" value="{{ next }}">
                        {% endif %}
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
