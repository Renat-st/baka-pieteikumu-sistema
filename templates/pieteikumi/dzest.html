<!DOCTYPE html>
<html>
<head>
    <title>Dzēst pieteikumu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger shadow">
                <div class="card-header bg-danger text-white">
                    <h4>Apstiprināt dzēšanu</h4>
                </div>
                <div class="card-body">
                    <p>Vai tiešām vēlaties dzēst pieteikumu:</p>
                    <h5 class="text-danger">{{ pieteikums.nosaukums }}</h5>
                    <p class="text-muted">{{ pieteikums.apraksts|truncatewords:15 }}</p>

                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Jā, dzēst</button>
                        <a href="/" class="btn btn-secondary ms-2">Atcelt</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
