<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3>{{ title }}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Nosaukums</label>
                            <input type="text" name="nosaukums" class="form-control"
                                   value="{{ pieteikums.nosaukums|default:'' }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Apraksts</label>
                            <textarea name="apraksts" class="form-control" rows="5">{{ pieteikums.apraksts|default:'' }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tips</label>
                            <select name="tips" class="form-select" required>
                                <option value="">-- Izvēlēties tipu --</option>
                                {% for t in tipsi %}
                                    <option value="{{ t.id }}" {% if pieteikums.tips.id == t.id %}selected{% endif %}>
                                        {{ t.nosaukums }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Statuss</label>
                            <select name="statuss" class="form-select" required>
                                <option value="">-- Izvēlēties statusu --</option>
                                {% for s in statusi %}
                                    <option value="{{ s.id }}" {% if pieteikums.statuss.id == s.id %}selected{% endif %}>
                                        {{ s.nosaukums }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        {% if request.user.is_staff %}
                        <div class="mb-3">
                            <label class="form-label">Piešķirt lietotājam</label>
                            <select name="assigned_to" class="form-select">
                                <option value="">-- Neviens --</option>
                                {% for u in users %}
                                    <option value="{{ u.id }}"
                                        {% if pieteikums.assigned_to.id == u.id %}selected{% endif %}>
                                        {{ u.username }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endif %}

                        <button type="submit" class="btn btn-success">Saglabāt</button>
                        <a href="/" class="btn btn-secondary ms-2">Atpakaļ</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
